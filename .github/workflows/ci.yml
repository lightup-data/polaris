name: CI

on:
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: collab
          POSTGRES_PASSWORD: collab
          POSTGRES_DB: collab
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U collab"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://collab:collab@localhost:5432/collab

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - run: bun test
